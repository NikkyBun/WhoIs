name: Build Windows EXE

# builds WHOIS-Nameservers.exe, up on an actual windows runner.
#  - any push to main, or a manual run  -> you get a build artifact, to download
#  - pushing a tag, like v2.23626        -> and it sticks the .exe onto a Release aswell
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # so it can stick the .exe onto a Release, on the tag pushes

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build standalone EXE
        run: pyinstaller --onefile --windowed --name "WHOIS-Nameservers" --icon "whois_icon.ico" whois_nameservers.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WHOIS-Nameservers-windows
          path: dist/WHOIS-Nameservers.exe
          if-no-files-found: error

      - name: Attach EXE to Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WHOIS-Nameservers.exe
